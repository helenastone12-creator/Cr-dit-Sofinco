  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f2f2f2;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    header, nav, footer, .hd-bar, .mob-nav, .hd-menu, .site-header { display: none !important; }

    /* ── Barre légale ── */
    .legal-bar {
      background: #ebebeb; border-bottom: 1px solid #d8d8d8;
      color: #555; font-size: .84rem; font-weight: 500;
      text-align: center; padding: .7rem 1.2rem; line-height: 1.5;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ════════════════════════════════
       MOBILE (défaut)
    ════════════════════════════════ */
    .mob-wrap {
      display: flex; flex-direction: column; gap: 1rem;
      max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 2rem; width: 100%;
    }

    /* Grande carte blanche : logo + titre + form */
    .mob-card {
      background: #fff; border-radius: 12px;
      padding: 2.4rem 1.8rem 2rem;
      box-shadow: 0 2px 18px rgba(0,0,0,.09);
    }
    .mob-brand {
      text-align: center; margin-bottom: 1.6rem;
      font-size: 2rem; font-weight: 900; color: #111;
      letter-spacing: .06em;
    }
    .mob-title {
      font-size: 1.65rem; font-weight: 900; color: #111;
      line-height: 1.15; margin-bottom: 1.8rem; text-align: center;
      text-transform: uppercase;
    }

    /* Bannière fraude mobile : bleue claire */
    .mob-fraud {
      background: linear-gradient(135deg, #a8d8ec 0%, #c5e8f5 100%);
      border-radius: 10px; padding: 1.4rem;
      border: 1px solid #90cce4;
    }
    .mob-fraud-head {
      display: flex; align-items: flex-start; gap: .6rem;
      font-size: .88rem; font-weight: 900; color: #0a3a52;
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: .8rem;
    }
    .mob-fraud-head svg { flex-shrink: 0; margin-top: .1rem; }
    .mob-fraud-body { font-size: .8rem; color: #1a4a62; line-height: 1.6; margin-bottom: .4rem; }
    .mob-fraud-body strong { color: #0a3a52; }
    .mob-fraud-body a { color: #0a3a52; text-decoration: underline; }

    /* Desktop : caché sur mobile */
    .desk-wrap { display: none; }
    .desk-alert-bar { display: none; }

    /* ════════════════════════════════
       DESKTOP (≥860px)
    ════════════════════════════════ */
    @media (min-width: 860px) {
      body { background: #f0f4f8; }
      .mob-wrap { display: none; }

      /* Barre alerte fraude */
      .desk-alert-bar {
        display: flex; align-items: center; justify-content: center; gap: .5rem;
        background: #fffbea; border-bottom: 1px solid #f0d878;
        color: #7a5800; font-size: .82rem; font-weight: 500;
        padding: .5rem 1.5rem; text-align: center;
      }
      .desk-alert-bar a { color: #7a5800; font-weight: 700; }

      /* Conteneur principal : deux colonnes pleine hauteur */
      .desk-wrap {
        display: flex; flex-direction: row; flex: 1;
      }

      /* ── Colonne gauche : formulaire ── */
      .desk-left {
        flex: 1; display: flex; flex-direction: column;
        background: #fff; padding: 2.2rem 2.5rem 2rem;
      }
      .desk-logo { text-decoration: none; display: inline-block; margin-bottom: 2.5rem; }
      .desk-logo-text {
        font-family: 'Montserrat', Arial, sans-serif; font-size: 1.4rem; font-weight: 800; color: #0C2D5E; letter-spacing: -.5px; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none;
      }
      .desk-form-area {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .desk-title {
        font-size: 1.55rem; font-weight: 700; color: #111;
        line-height: 1.25; margin-bottom: 1.6rem; text-align: center;
      }
      .desk-form-label {
        font-size: .72rem; font-weight: 800; color: #aaa;
        text-transform: uppercase; letter-spacing: .12em; margin-bottom: .9rem;
        text-align: center;
      }
      .desk-card {
        width: 100%; max-width: 400px;
      }

      /* ── Colonne droite : avantages ── */
      .desk-right {
        flex: 1; display: flex; flex-direction: column;
        justify-content: center;
        background: linear-gradient(150deg, #daeef8 0%, #c2e3f4 100%);
        padding: 3rem 3rem 2rem;
      }
      .desk-features { display: flex; flex-direction: column; gap: 1.1rem; }
      .desk-feature {
        display: flex; align-items: flex-start; gap: 1rem;
        background: rgba(255,255,255,.65); border-radius: 10px;
        padding: 1rem 1.2rem;
      }
      .desk-feature-icon {
        width: 38px; height: 38px; flex-shrink: 0;
        background: rgba(255,255,255,.9); border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
      }
      .desk-feature-text { font-size: .88rem; color: #1a3a52; line-height: 1.55; font-weight: 500; }
    }

    /* ── Champs communs ── */
    .field-group { margin-bottom: 1.1rem; }
    .field-label { display: block; font-size: .88rem; font-weight: 600; color: #333; margin-bottom: .4rem; }
    .field-wrap input {
      width: 100%; border: 1.5px solid #c8c8c8; border-radius: 6px;
      padding: .95rem 1rem; font-size: .97rem; font-family: inherit;
      color: #111; background: #fff; outline: none;
      transition: border-color .18s;
    }
    .field-wrap input::placeholder { color: #aaa; }
    .field-wrap input:focus { border-color: #888; }

    .form-err {
      background: #fdf0ef; border: 1px solid rgba(192,57,43,.25);
      border-radius: 6px; padding: .65rem .9rem; font-size: .82rem;
      color: #c0392b; margin-bottom: 1rem; line-height: 1.45;
    }

    .btn-main {
      display: block; width: 100%; padding: 1.05rem;
      background: #555; color: #fff; border: none; border-radius: 6px;
      font-size: .97rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background .2s; margin-top: .4rem;
    }
    .btn-main:hover { background: #333; }
    .btn-main:disabled { background: #b0b0b0; cursor: not-allowed; }

    .forgot-link {
      display: block; text-align: center; margin-top: .9rem;
      font-size: .85rem; font-weight: 700; color: #1a3a5c;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .forgot-link:hover { color: #0a2a4c; }

    .otp-input {
      text-align: center; font-size: 1.8rem; font-weight: 800;
      letter-spacing: .35em;
    }

    .footer-links {
      display: flex; flex-wrap: wrap; justify-content: center;
      align-items: center; gap: .25rem .5rem;
      font-size: .72rem; padding: 1rem 0 .3rem; color: #999;
    }
    .footer-links a { color: #c0392b; text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
    .footer-links span { color: #ccc; }

    .remember-wrap {
      display: flex; align-items: center; gap: .5rem;
      font-size: .84rem; color: #555; cursor: pointer;
      margin: .6rem 0 .8rem; user-select: none;
    }
    .remember-wrap input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: #333;
      cursor: pointer; flex-shrink: 0;
    }

    .sep {
      display: flex; align-items: center; gap: .8rem;
      margin: 1rem 0; color: #aaa; font-size: .8rem;
    }
    .sep::before, .sep::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
  </style>
</head>

<script src="../fidexico-db.js"></script>
<script src="../fidexico-email.js"></script>
<script src="../fidexico-2fa.js"></script>
<script src="../espace-client.js"></script>
<script>
var _conClient  = null;
var _conOTP     = null;
var _conOTPExp  = 0;
var _conLastSend = 0;
var _conCooldown = 60000;

/* ── Se souvenir de moi ── */
(function(){
  var saved = localStorage.getItem('con_remember');
  if(!saved) return;
  try {
    var d = JSON.parse(saved);
    ['mob','desk'].forEach(function(p){
      var em = document.getElementById(p+'-email');
      var fdx = document.getElementById(p+'-fdx');
      var cb = document.getElementById(p+'-remember');
      if(em && d.email) em.value = d.email;
      if(fdx && d.fdx) fdx.value = d.fdx;
      if(cb) cb.checked = true;
    });
  } catch(e){}
})();

function conToggleRemember(p){
  var cb = document.getElementById(p+'-remember');
  var other = document.getElementById((p==='mob'?'desk':'mob')+'-remember');
  if(other) other.checked = cb.checked;
  if(!cb.checked) localStorage.removeItem('con_remember');
}

function _conSaveIfRemember(p, email, fdx){
  var cb = document.getElementById(p+'-remember') || document.getElementById('mob-remember');
  if(cb && cb.checked){
    localStorage.setItem('con_remember', JSON.stringify({email: email, fdx: fdx}));
  } else {
    localStorage.removeItem('con_remember');
  }
}

function _pfx(p){ return p === 'mob' ? 'mob' : 'desk'; }

function _conErr(p, slot, msg){
  var el = document.getElementById(p+'-err'+slot);
  if(!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function _conBusy(p, slot, busy){
  var b = document.getElementById(p+'-btn'+slot);
  if(!b) return;
  b.disabled = busy;
  b.textContent = busy ? ecT('con_loading') : ecT('con_btn');
}
function _conGenOTP(){ return String(Math.floor(100000 + Math.random() * 900000)); }

function conGoBack(p){
  document.getElementById(p+'-step2').style.display = 'none';
  document.getElementById(p+'-step-totp').style.display = 'none';
  document.getElementById(p+'-step1').style.display = 'block';
  var otp = document.getElementById(p+'-otp'); if(otp) otp.value = '';
  var totp = document.getElementById(p+'-totp'); if(totp) totp.value = '';
  _conErr(p, '2', '');
  var et = document.getElementById(p+'-err-totp'); if(et){ et.textContent=''; et.style.display='none'; }
}

function conStep1(p){
  var email = document.getElementById(p+'-email').value.trim().toLowerCase();
  var fdx   = document.getElementById(p+'-fdx').value.trim().toUpperCase();
  _conErr(p, '1', '');
  if(!email || !fdx){ _conErr(p, '1', ecT('con_err_empty')); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ _conErr(p, '1', ecT('con_err_email')); return; }
  _conBusy(p, '1', true);

  FidDB.getClientByIdAndEmail(fdx, email)
    .then(function(client){
      if(!client){
        _conErr(p, '1', ecT('con_err_notfound'));
        _conBusy(p, '1', false); return;
      }
      var allowedStatuses = ['active', 'en_etude', 'valide'];
      if(client.blocked || (client.status && allowedStatuses.indexOf(client.status) === -1)){
        _conErr(p, '1', ecT('con_err_inactive'));
        _conBusy(p, '1', false); return;
      }
      _conClient = client;

      /* Si 2FA activée → demander le code TOTP (pas d'email OTP) */
      if(client.totp_secret){
        document.getElementById(p+'-step1').style.display = 'none';
        document.getElementById(p+'-step-totp').style.display = 'block';
        _conBusy(p, '1', false);
        setTimeout(function(){ var i = document.getElementById(p+'-totp'); if(i) i.focus(); }, 200);
        return;
      }

      /* Sinon → envoyer OTP par email */
      var now = Date.now();
      if(now - _conLastSend < _conCooldown){
        var wait = Math.ceil((_conCooldown - (now - _conLastSend)) / 1000);
        _conErr(p, '1', ecT('con_err_wait').replace('{sec}', wait));
        _conBusy(p, '1', false); return;
      }
      _conOTP     = _conGenOTP();
      _conOTPExp  = now + 10 * 60 * 1000;
      _conLastSend = now;
      return FidEmail.sendLoginOTP(email, client.prenom || 'Client', _conOTP, fdx)
        .then(function(){
          var shown = document.getElementById(p+'-email-shown');
          if(shown) shown.textContent = email;
          document.getElementById(p+'-step1').style.display = 'none';
          document.getElementById(p+'-step2').style.display = 'block';
          _conBusy(p, '1', false);
          setTimeout(function(){ var i = document.getElementById(p+'-otp'); if(i) i.focus(); }, 200);
        });
    })
    .catch(function(e){
      console.error(e);
      _conErr(p, '1', ecT('con_err_generic'));
      _conBusy(p, '1', false);
    });
}

function conStepTOTP(p){
  var code = document.getElementById(p+'-totp').value.replace(/\s/g, '');
  var errEl = document.getElementById(p+'-err-totp');
  if(errEl){ errEl.textContent=''; errEl.style.display='none'; }
  if(!code || code.length < 6){
    if(errEl){ errEl.textContent=ecT('con_totp_short'); errEl.style.display='block'; } return;
  }
  var btn = document.getElementById(p+'-btn-totp');
  if(btn){ btn.disabled=true; btn.textContent=ecT('con_loading'); }
  FID2FA.verify(_conClient.totp_secret, code).then(function(ok){
    if(!ok){
      if(errEl){ errEl.textContent=ecT('con_totp_wrong'); errEl.style.display='block'; }
      if(btn){ btn.disabled=false; btn.textContent=ecT('con_btn'); }
      return;
    }
    _conSaveIfRemember(p, _conClient.email, _conClient.id);
    ecCompleteLogin(_conClient);
  });
}

function conResend(p){
  if(!_conClient) return;
  var now = Date.now();
  if(now - _conLastSend < _conCooldown){
    var wait = Math.ceil((_conCooldown - (now - _conLastSend)) / 1000);
    _conErr(p, '2', ecT('con_err_wait').replace('{sec}', wait));
    return;
  }
  _conOTP      = _conGenOTP();
  _conOTPExp   = now + 10 * 60 * 1000;
  _conLastSend = now;
  FidEmail.sendLoginOTP(_conClient.email, _conClient.prenom || 'Client', _conOTP, _conClient.id)
    .then(function(){
      var el = document.getElementById(p+'-err2');
      if(!el) return;
      el.style.background = '#f0f9f4'; el.style.color = '#1a7a3c';
      el.style.borderColor = 'rgba(26,122,60,.2)';
      el.textContent = ecT('con_resend_ok');
      el.style.display = 'block';
    })
    .catch(function(){ _conErr(p, '2', ecT('con_resend_err')); });
}

function conStep2(p){
  var code = document.getElementById(p+'-otp').value.replace(/\s/g, '');
  _conErr(p, '2', '');
  if(!code || code.length < 6){ _conErr(p, '2', ecT('con_otp_short')); return; }
  if(Date.now() > _conOTPExp){ _conErr(p, '2', ecT('con_otp_expired')); return; }
  if(code !== _conOTP){ _conErr(p, '2', ecT('con_otp_wrong')); return; }
  _conBusy(p, '2', true);
  _conSaveIfRemember(p, _conClient.email, _conClient.id);
  ecCompleteLogin(_conClient);
}

if(typeof ecApplyI18n === 'function') ecApplyI18n();
</script>
