<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Espace client Fidexico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'"/><noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/></noscript>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="espace-client.css"/>
  <script src="ec-i18n.js"></script>
</head>
<body class="ec-body">

<div class="ec-auth-wrap">

  <a href="index.html" class="ec-auth-logo">Fidexico</a>
  <p class="ec-auth-sub" data-i18n="nav_espace">Espace client</p>

  <div class="ec-auth-card">
    <h1 class="ec-auth-title" data-i18n="login_title">Connexion</h1>
    <p class="ec-auth-hint" data-i18n="login_hint">Accédez à vos crédits et documents en toute sécurité.</p>

    <div id="ec-login-err" class="ec-form-err" style="display:none">
      <span data-i18n="login_err">Identifiants incorrects. Vérifiez votre email et mot de passe.</span>
    </div>

    <div class="ec-form-group">
      <label class="ec-lbl" for="ec-email" data-i18n="login_email_lbl">Adresse email</label>
      <input type="email" id="ec-email" class="ec-inp" data-i18n-placeholder="login_email_ph" placeholder="votre@email.fr" autocomplete="email"/>
    </div>

    <div class="ec-form-group">
      <label class="ec-lbl" for="ec-pwd" data-i18n="login_pwd_lbl">Mot de passe</label>
      <div class="ec-pwd-wrap">
        <input type="password" id="ec-pwd" class="ec-inp" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="ec-eye-btn" onclick="ecTogglePwd('ec-pwd',this)" data-i18n-aria="login_show_pwd" aria-label="Afficher le mot de passe">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <a href="mot-de-passe-oublie.html" class="ec-forgot" data-i18n="login_forgot">Mot de passe oublié ?</a>

    <button class="ec-btn-primary" onclick="ecLogin()" data-i18n="login_btn">Se connecter</button>

    <div class="ec-auth-sep"><span data-i18n="login_or">ou</span></div>

    <a href="index.html" class="ec-btn-secondary" data-i18n="login_simulate">Faire une simulation</a>
  </div>

  <p class="ec-auth-legal">
    <span data-i18n="login_rgpd">Vos données sont protégées conformément au RGPD.</span><br/>
    <a href="politique-donnees.html" data-i18n="login_privacy">Politique de confidentialité</a>
  </p>

</div>

<script src="fidexico-db.js"></script>
<script src="fidexico-email.js"></script>
<script src="espace-client.js"></script>
<script>if(typeof ecApplyI18n==='function') ecApplyI18n();</script>
</body>
</html>
