<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Créer un compte — Espace client Solfianza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'"/><noscript><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=optional" rel="stylesheet"/></noscript>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="espace-client.css"/>
<script>
(function(){
  var stored = localStorage.getItem('lang_choice');
  if(stored) return;
  var lang = (navigator.language || navigator.userLanguage || 'fr').toLowerCase().split('-')[0];
  var supported = ['en','de','es','it','nl','pl','sv'];
  if(supported.indexOf(lang) === -1) return;
  var page = location.pathname.split('/').pop() || 'index.html';
  if(!page.endsWith('.html')) page = 'index.html';
  localStorage.setItem('lang_choice', lang);
  location.replace('/' + lang + '/' + page);
})();
</script>
</head>
<body class="ec-body">

<div class="ec-auth-wrap">

  <a href="index.html" class="ec-auth-logo">Solfianza</a>
  <p class="ec-auth-sub">Espace client</p>

  <div class="ec-auth-card">
    <h1 class="ec-auth-title">Créer mon compte</h1>
    <p class="ec-auth-hint">Accédez à vos crédits, documents et suivis de dossier.</p>

    <div id="ec-reg-err" class="ec-form-err" style="display:none"></div>

    <div class="ec-row2">
      <div class="ec-form-group">
        <label class="ec-lbl" for="ec-prenom">Prénom <span class="ec-req">*</span></label>
        <input type="text" id="ec-prenom" class="ec-inp" placeholder="Votre prénom" autocomplete="given-name"/>
      </div>
      <div class="ec-form-group">
        <label class="ec-lbl" for="ec-nom">Nom <span class="ec-req">*</span></label>
        <input type="text" id="ec-nom" class="ec-inp" placeholder="Votre nom" autocomplete="family-name"/>
      </div>
    </div>

    <div class="ec-form-group">
      <label class="ec-lbl" for="ec-email-reg">Adresse email <span class="ec-req">*</span></label>
      <input type="email" id="ec-email-reg" class="ec-inp" placeholder="votre@email.fr" autocomplete="email"/>
    </div>

    <div class="ec-form-group">
      <label class="ec-lbl" for="ec-tel-reg">Téléphone mobile <span class="ec-req">*</span></label>
      <input type="tel" id="ec-tel-reg" class="ec-inp" placeholder="06 XX XX XX XX" autocomplete="tel"/>
    </div>

    <div class="ec-form-group">
      <label class="ec-lbl" for="ec-ref-dossier">Numéro de dossier (optionnel)</label>
      <input type="text" id="ec-ref-dossier" class="ec-inp" placeholder="SOF-2026-XXXXX"/>
      <span class="ec-field-note">Renseignez votre numéro de dossier pour lier votre demande à votre compte.</span>
    </div>

    <div class="ec-form-group">
      <label class="ec-lbl" for="ec-pwd-reg">Mot de passe <span class="ec-req">*</span></label>
      <div class="ec-pwd-wrap">
        <input type="password" id="ec-pwd-reg" class="ec-inp" placeholder="Minimum 8 caractères" autocomplete="new-password"/>
        <button type="button" class="ec-eye-btn" onclick="ecTogglePwd('ec-pwd-reg',this)" aria-label="Afficher">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="ec-pwd-strength" id="ec-pwd-strength"></div>
    </div>

    <div class="ec-form-group">
      <label class="ec-lbl" for="ec-pwd-confirm">Confirmer le mot de passe <span class="ec-req">*</span></label>
      <div class="ec-pwd-wrap">
        <input type="password" id="ec-pwd-confirm" class="ec-inp" placeholder="Répétez votre mot de passe" autocomplete="new-password"/>
        <button type="button" class="ec-eye-btn" onclick="ecTogglePwd('ec-pwd-confirm',this)" aria-label="Afficher">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <label class="ec-check-item">
      <input type="checkbox" id="ec-cgu"/>
      <span class="ec-check-box"></span>
      <span class="ec-check-txt">J'accepte les <a href="cgu.html">Conditions Générales</a> et la <a href="politique-donnees.html">Politique de confidentialité</a> <span class="ec-req">*</span></span>
    </label>

    <button class="ec-btn-primary" style="margin-top:1.2rem" onclick="ecRegister()">Créer mon compte</button>

    <p class="ec-switch-link">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
    <div class="mob-lang-row">
      <div class="mob-lang-select-wrap">
        <button class="mob-lang-select-btn" id="mob-lang-btn" aria-haspopup="listbox" aria-expanded="false">
          <span class="mob-lang-select-left">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
            <span id="mob-lang-current-name">Langue</span>
          </span>
          <svg class="mob-lang-select-btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="mob-lang-dropdown" id="mob-lang-dropdown" role="listbox"></div>
      </div>
    </div>
  </div>

</div>

<script src="espace-client.js"></script>
</body>
</html>
