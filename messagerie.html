<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messagerie sécurisée — Solfianza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'"/><noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/></noscript>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="espace-client.css"/>
  <style>
    .ec-msg-page{ max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:1rem;height:calc(100vh - 56px - 70px); }
    .ec-msg-thread{
      flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.75rem;
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:1.2rem;box-shadow:var(--shadow-xs);
    }
    .ec-msg-empty{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.8rem;color:var(--muted);text-align:center;
    }
    .ec-msg-empty svg{opacity:.3;}
    .ec-msg-empty p{font-size:.88rem;}
    .ec-msg-item{ display:flex; }
    .ec-msg-item--client{ justify-content:flex-end; }
    .ec-msg-item--bank{ justify-content:flex-start; }
    .ec-msg-bubble{
      max-width:75%;border-radius:12px;padding:.65rem .9rem;
    }
    .ec-msg-item--client .ec-msg-bubble{
      background:var(--brand);color:#fff;border-bottom-right-radius:4px;
    }
    .ec-msg-item--bank .ec-msg-bubble{
      background:var(--bg);border:1px solid var(--border);border-bottom-left-radius:4px;
    }
    .ec-msg-meta{ display:flex;gap:.6rem;align-items:center;margin-bottom:.3rem; }
    .ec-msg-sender{ font-size:.72rem;font-weight:600;opacity:.8; }
    .ec-msg-time{ font-size:.68rem;opacity:.6; }
    .ec-msg-body{ font-size:.85rem;line-height:1.55; }
    .ec-msg-compose{
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:1rem 1.2rem;box-shadow:var(--shadow-xs);display:flex;gap:.75rem;align-items:flex-end;
    }
    .ec-msg-input{
      flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);
      padding:.6rem .9rem;font-size:.88rem;resize:none;font-family:inherit;
      color:var(--text);outline:none;transition:border-color .15s;min-height:44px;max-height:120px;
    }
    .ec-msg-input:focus{ border-color:var(--brand); }
    .ec-msg-send{
      background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);
      padding:.6rem 1.1rem;font-size:.85rem;font-weight:600;cursor:pointer;
      display:flex;align-items:center;gap:.4rem;transition:opacity .15s;flex-shrink:0;
    }
    .ec-msg-send:hover{opacity:.85;}
    .ec-msg-secure-note{
      font-size:.72rem;color:var(--muted);text-align:center;display:flex;align-items:center;justify-content:center;gap:.35rem;
    }
  </style>
</head>
<body class="ec-body ec-dash-body">

<!-- Header -->
<header class="ec-header">
  <a href="index.html" class="ec-hd-logo">Solfianza</a>
  <div class="ec-hd-right">
    <button class="ec-hd-bell" id="ec-hd-bell" onclick="ecOpenModal('alertes')" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="ec-hd-bell-dot" id="ec-bell-dot" style="display:none"></span>
    </button>
    <a href="profil.html" class="ec-hd-avatar" id="ec-hd-avatar">J</a>
    <button class="ec-hd-logout ec-hd-logout--mobile" onclick="ecLogout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </button>
  </div>
</header>

<!-- Main -->
<main class="ec-main">

  <!-- Titre -->
  <div class="ec-welcome" style="margin-bottom:.8rem">
    <div>
      <p class="ec-welcome-sub">Espace client</p>
      <h1 class="ec-welcome-title" style="font-size:1.3rem">Messagerie sécurisée</h1>
    </div>
  </div>

  <div class="ec-msg-page">
    <!-- Fil de messages -->
    <div class="ec-msg-thread" id="ec-msg-list">
      <div class="ec-msg-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Aucun message pour le moment.<br>Envoyez votre première demande ci-dessous.</p>
      </div>
    </div>

    <!-- Formulaire -->
    <div class="ec-msg-compose">
      <textarea class="ec-msg-input" id="ec-msg-input" placeholder="Écrivez votre message à votre conseiller…" rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ecSendMessage();}"></textarea>
      <button class="ec-msg-send" onclick="ecSendMessage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Envoyer
      </button>
    </div>

    <div class="ec-msg-secure-note">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Canal sécurisé — Vos messages sont chiffrés et conservés dans votre espace.
    </div>
  </div>

</main>

<!-- Navigation bas / Sidebar desktop -->
<nav class="ec-bottom-nav">
  <div class="ec-sidebar-brand">
    <a href="index.html" class="ec-sidebar-logo">Solfianza</a>
    <div class="ec-sidebar-tagline">Espace Client</div>
  </div>
  <div class="ec-sidebar-user-card" id="ec-sidebar-user-card">
    <div class="ec-sidebar-avatar" id="ec-sidebar-avatar">J</div>
    <div class="ec-sidebar-user-info">
      <div class="ec-sidebar-user-name" id="ec-sidebar-user-name">—</div>
      <div class="ec-sidebar-user-id" id="ec-sidebar-user-id">—</div>
    </div>
  </div>
  <div class="ec-sidebar-divider"></div>

  <a href="espace-client.html" class="ec-bnav-link">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Accueil</span>
    <div class="ec-bnav-dot"></div>
  </a>
  <a href="mes-documents.html" class="ec-bnav-link">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Documents</span>
    <div class="ec-bnav-dot"></div>
  </a>
  <a href="suivi-dossier.html" class="ec-bnav-link">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Suivi dossier</span>
    <div class="ec-bnav-dot"></div>
  </a>
  <a href="messagerie.html" class="ec-bnav-link active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Messages</span>
    <div class="ec-bnav-dot"></div>
  </a>
  <a href="profil.html" class="ec-bnav-link">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span>Mon profil</span>
    <div class="ec-bnav-dot"></div>
  </a>

  <button class="ec-sidebar-logout" onclick="ecLogout()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Déconnexion
  </button>
</nav>


<script src="espace-client.js"></script>
</body>
</html>
